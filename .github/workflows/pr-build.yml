name: PR Builder for WhereIsMyHead

on:
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Build
        run: dotnet build .\WhereIsMyHead.sln --configuration Release

      - name: Test
        run: dotnet test .\WhereIsMyHead.sln --configuration Release --no-build

      - name: Store plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhereIsMyHead
          path: .\WhereIsMyHead\bin\x64\Release\WhereIsMyHead\*
          if-no-files-found: error
          retention-days: 1

